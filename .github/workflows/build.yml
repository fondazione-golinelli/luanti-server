name: Build and publish Luanti Pelican image

on:
  schedule:
    # Check daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if tag already exists"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.check.outputs.latest_tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Get latest Luanti release tag
        id: check
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/luanti-org/luanti/releases/latest | jq -r '.tag_name')
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

          # Check if we already have this tag published
          TOKEN=$(echo "${{ secrets.GITHUB_TOKEN }}" | base64)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ env.REGISTRY }}/v2/${{ env.IMAGE_NAME }}/manifests/${LATEST_TAG}")

          if [ "$STATUS" = "200" ] && [ "${{ inputs.force_build }}" != "true" ]; then
            echo "Tag ${LATEST_TAG} already exists, skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${LATEST_TAG} not found or force build requested, will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version number
        id: version
        run: |
          TAG="${{ needs.check.outputs.latest_tag }}"
          # Strip leading 'v' if present (e.g., v5.15.1 -> 5.15.1)
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          echo "full=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            LUANTI_VERSION=${{ needs.check.outputs.latest_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.full }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
